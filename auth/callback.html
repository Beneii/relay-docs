<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay — Signing in...</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 360px; padding: 20px; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: #a1a1aa; font-size: 0.9375rem; }
    a { color: #6366f1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Signing you in...</h1>
    <p>If the app doesn't open automatically, <a id="deep-link" href="#">tap here</a>.</p>
  </div>
  <script>
    // Supabase appends tokens as a hash fragment: #access_token=...&refresh_token=...
    // Forward the entire fragment to the app's deep link scheme
    var hash = window.location.hash;
    var deepLink = 'relay://auth-callback' + hash;
    document.getElementById('deep-link').href = deepLink;
    window.location.replace(deepLink);
  </script>
</body>
</html>
