<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relay — Your dashboards, one tap away</title>
    <meta name="description" content="Save any web dashboard as a native app on your phone. Send instant push notifications via webhook from Grafana, Home Assistant, CI/CD, and more." />
    <meta name="keywords" content="webhook notifications, push notifications, mobile dashboard, Grafana alerts, Home Assistant notifications, DevOps alerts, webhook to mobile" />
    <link rel="canonical" href="https://relayapp.dev" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Relay — Your dashboards, one tap away" />
    <meta property="og:description" content="Save any web dashboard as a native app on your phone. Send instant push notifications via webhook from Grafana, Home Assistant, CI/CD, and more." />
    <meta property="og:url" content="https://relayapp.dev" />
    <meta property="og:site_name" content="Relay" />
    <meta property="og:image" content="https://relayapp.dev/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Relay — Your dashboards, one tap away" />
    <meta name="twitter:description" content="Save any web dashboard as a native app on your phone. Send instant push notifications via webhook from Grafana, Home Assistant, CI/CD, and more." />
    <meta name="twitter:image" content="https://relayapp.dev/og-image.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://relayapp.dev/#organization",
            "name": "Relay",
            "url": "https://relayapp.dev",
            "logo": "https://relayapp.dev/logo-dark.png"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://relayapp.dev/#softwareapplication",
            "name": "Relay",
            "url": "https://relayapp.dev",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": ["iOS", "Android", "Web"],
            "publisher": {
              "@id": "https://relayapp.dev/#organization"
            },
            "offers": [
              {
                "@type": "Offer",
                "name": "Free",
                "price": "0",
                "priceCurrency": "USD",
                "url": "https://relayapp.dev/pricing"
              },
              {
                "@type": "Offer",
                "name": "Pro",
                "price": "7.99",
                "priceCurrency": "USD",
                "url": "https://relayapp.dev/pricing"
              }
            ]
          },
          {
            "@type": "FAQPage",
            "@id": "https://relayapp.dev/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is Relay?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Relay is a mobile command center for web dashboards. Save any web dashboard as a native app on your phone, send webhooks to receive push notifications, and tap to open your dashboards instantly. It is commonly used to monitor AI agents, automations, servers, and self-hosted systems."
                }
              },
              {
                "@type": "Question",
                "name": "Do my dashboards need to be public?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Most users access dashboards through Tailscale or another private network. Relay simply loads the URL you provide — your dashboards stay on your own infrastructure."
                }
              },
              {
                "@type": "Question",
                "name": "Does Relay host my dashboards?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Relay simply loads your existing dashboards in a mobile interface and sends notifications. Your data and dashboards remain wherever you host them."
                }
              },
              {
                "@type": "Question",
                "name": "Do I need to store images for notification icons?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Relay supports icon_url, so images can be hosted anywhere — your own server, a CDN, or any public URL."
                }
              },
              {
                "@type": "Question",
                "name": "Does Relay replace my dashboard?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Relay is a mobile companion for dashboards and automation systems. It gives you a native app wrapper and push notifications on top of your existing setup."
                }
              },
              {
                "@type": "Question",
                "name": "What kinds of systems work with Relay?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Anything that can send a webhook — AI agents, automation tools, CI pipelines, servers, scripts, monitoring systems, trading bots, and more. If it can make an HTTP POST request, it works with Relay."
                }
              },
              {
                "@type": "Question",
                "name": "How do push notifications work?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Each dashboard you save gets a unique webhook token. Send a simple HTTP POST request with a title and body to our endpoint, and Relay delivers an instant push notification to your phone. Tap the notification to open the associated dashboard."
                }
              },
              {
                "@type": "Question",
                "name": "Is there a free plan?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. The free plan includes 3 dashboards, 1 device, and 100 notifications per month. Upgrade to Pro for unlimited dashboards and 10,000 notifications/month."
                }
              },
              {
                "@type": "Question",
                "name": "Do I need to install an SDK?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Relay uses a simple REST API — just send an HTTP POST request from any language, script, or CI/CD pipeline. No SDKs, no dependencies."
                }
              }
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
