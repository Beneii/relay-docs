<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay — Signing in...</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 360px; padding: 20px; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: #a1a1aa; font-size: 0.9375rem; }
    a { color: #10B981; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #27272a;
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Signing you in...</h1>
    <p id="message"></p>
    <div class="spinner" id="spinner"></div>
  </div>
  <script>
    var SUPABASE_URL = 'https://wvlbdjpllcnmndkujzpy.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2bGJkanBsbGNubW5ka3VqenB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjA1MTcsImV4cCI6MjA4ODQzNjUxN30.QDzfYJN8UCE12hR3qjqps4QUfE7u6B4n779awNSb4Fo';

    function isValidRedirect(url) {
      // Ensure the URL is a relative path starting with /
      // and does not start with // (which is protocol-relative)
      return typeof url === 'string' && url.startsWith('/') && !url.startsWith('//');
    }

    var hash = window.location.hash;
    var search = window.location.search;
    var params = new URLSearchParams(search);

    // SECURITY RECOMMENDATION: Session tokens should ideally be passed in the 
    // hash fragment (e.g., #t=...&r=...) instead of query parameters to 
    // prevent them from being leaked via Referrer headers to third-party CDNs or APIs.
    var hashParams = new URLSearchParams(hash.substring(1));

    // Path 1: Mobile app handoff — tokens as query params ?t=...&r=...&to=/pricing
    // Also checking hash for tokens as a more secure alternative
    var accessToken = hashParams.get('t') || params.get('t');
    var refreshToken = hashParams.get('r') || params.get('r');
    var redirectTo = hashParams.get('to') || params.get('to') || '/dashboard';

    // Validate redirectTo to prevent Open Redirect vulnerability
    if (!isValidRedirect(redirectTo)) {
      redirectTo = '/dashboard';
    }

    if (accessToken && refreshToken) {
      document.getElementById('message').textContent = 'Setting up your session...';

      import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm').then(function(mod) {
        var supabase = mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        }).then(function(result) {
          if (result.error) {
            document.getElementById('message').innerHTML = 'Session expired. <a href="/login">Sign in again</a>';
            document.getElementById('spinner').style.display = 'none';
            return;
          }
          window.location.replace(redirectTo);
        }).catch(function() {
          document.getElementById('message').innerHTML = 'Something went wrong. <a href="/login">Sign in again</a>';
          document.getElementById('spinner').style.display = 'none';
        });
      }).catch(function() {
        // Fallback if CDN fails
        window.location.replace('/login');
      });
    }
    // Path 2: OAuth callback — Supabase puts tokens in hash fragment
    else if (hash && hash.indexOf('access_token') !== -1) {
      document.getElementById('message').textContent = 'Redirecting...';

      // Check if this came from mobile (relay:// deep link)
      var isMobileApp = /relay:\/\//.test(document.referrer) ||
        (search && search.indexOf('mobile=1') !== -1);

      if (isMobileApp) {
        var deepLink = 'relay://auth-callback' + hash;
        document.getElementById('message').innerHTML = 'Opening app... <a href="' + deepLink + '">Tap here</a> if it doesn\'t open.';
        window.location.replace(deepLink);
      } else {
        // Web OAuth: set session and redirect to dashboard
        var oauthParams = {};
        hash.substring(1).split('&').forEach(function(part) {
          var kv = part.split('=');
          oauthParams[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
        });

        if (oauthParams.access_token && oauthParams.refresh_token) {
          import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm').then(function(mod) {
            var supabase = mod.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            supabase.auth.setSession({
              access_token: oauthParams.access_token,
              refresh_token: oauthParams.refresh_token
            }).then(function() {
              window.location.replace('/dashboard');
            }).catch(function() {
              window.location.replace('/login');
            });
          }).catch(function() {
            window.location.replace('/dashboard' + hash);
          });
        } else {
          window.location.replace('/dashboard');
        }
      }
    }
    // Path 3: Auth error
    else if (hash && hash.indexOf('error') !== -1) {
      document.getElementById('message').innerHTML = 'Authentication failed. <a href="/login">Try again</a>';
      document.getElementById('spinner').style.display = 'none';
    }
    // Path 4: No tokens at all
    else {
      window.location.replace('/login');
    }
  </script>
</body>
</html>
